kind = "web"
previewPath = "/"
title = "Quranic Linguistic Explorer"
version = "1.0.0"
id = "artifacts/quran-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24938

[services.development]
run = "pnpm --filter @workspace/quran-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-explorer", "run", "build" ]
publicDir = "artifacts/quran-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24938"
BASE_PATH = "/"
